<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>亲戚称呼计算</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f8;
      --panel: #fff;
      --line: #ededf0;
      --text: #111;
      --muted: rgba(0, 0, 0, .50);
      --disabled: rgba(0, 0, 0, .22);
      --accent: #ff6900;
      --key: #fbfbfc;
      --key-active: #f0f0f2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: MiSans, "MI Lan Pro", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(100vw, 520px);
      height: 100vh;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto 1fr 44vh;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .04);
    }

    .topbar {
      display: flex;
      align-items: center;
      font-weight: 600;
      border-bottom: 1px solid transparent;
      flex: none;
    }

    .display {
      min-height: 0;
      padding: 0 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      text-align: right;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .display::-webkit-scrollbar {
      display: none;
    }

    .input {
      width: 100%;
      color: var(--text);
      font-size: 36px;
      line-height: 1.18;
      word-break: break-all;
      white-space: normal;
      transition: color .12s ease, font-size .12s ease;
    }

    .result {
      width: 100%;
      margin-top: 3px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.22;
      word-break: break-all;
      white-space: normal;
      min-height: 1.22em;
      transition: color .12s ease, font-size .12s ease;
    }

    .state-equal .input,
    .state-cross .input {
      color: var(--muted);
      font-size: 24px;
    }

    .state-equal .result,
    .state-cross .result {
      color: var(--text);
      font-size: 36px;
    }

    .pad {
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      background: var(--line);
      border-top: 1px solid var(--line);
      gap: 1px 0;
      direction: ltr;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0 1px;
      min-height: 0;
    }

    .row.last {
      grid-template-columns: 499fr 153fr;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 0;
      margin: 0;
      padding: 0;
      min-width: 0;
      min-height: 0;
      background: var(--key);
      color: var(--text);
      font: inherit;
      font-size: 22px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .08s ease, color .08s ease, opacity .08s ease;
    }

    button:active:not(:disabled) {
      background: var(--key-active);
    }

    button:disabled {
      color: var(--disabled);
      cursor: default;
    }

    .op {
      font-size: 24px;
      color: #3b3b3f;
    }

    .equal {
      background: var(--accent);
      color: #fff;
      font-size: 30px;
      font-weight: 500;
    }

    .equal:active {
      background: #ee5f00;
    }

    .equal:disabled {
      color: rgba(255, 255, 255, .55);
      background: #ffc6a3;
    }

    .cross {
      font-size: 22px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #000;
        --panel: #151517;
        --line: #242428;
        --text: rgba(255, 255, 255, .90);
        --muted: rgba(255, 255, 255, .70);
        --disabled: rgba(255, 255, 255, .28);
        --key: #202023;
        --key-active: #2b2b30;
      }
    }

    @media (max-height: 620px) {
      .app {
        grid-template-rows: auto 1fr 48vh;
      }

      .input {
        font-size: 28px;
      }

      .result {
        font-size: 20px;
      }

      .state-equal .input,
      .state-cross .input {
        font-size: 20px;
      }

      .state-equal .result,
      .state-cross .result {
        font-size: 28px;
      }

      button {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <main class="app state-normal" id="app">
    <header class="topbar"></header>
    <section class="display" id="display">
      <div class="input" id="input">我</div>
      <div class="result" id="result"></div>
    </section>
    <section class="pad" aria-label="亲戚称呼键盘">
      <div class="row">
        <button class="rel" data-name="丈夫">夫</button>
        <button class="rel" data-name="妻子">妻</button>
        <button class="op" data-action="clear" aria-label="清除">C</button>
        <button class="op" data-action="delete" aria-label="删除">⌫</button>
      </div>
      <div class="row">
        <button class="rel" data-name="爸爸">父</button>
        <button class="rel" data-name="妈妈">母</button>
        <button class="rel" data-name="儿子">子</button>
        <button class="rel" data-name="女儿">女</button>

      <div class="row">

        <button class="rel" data-name="姐姐">姐</button>
        <button class="rel" data-name="妹妹">妹</button>
      </div>
      <div class="row last">
        <button class="cross" data-action="cross" disabled>互查</button>
        <button class="equal" data-action="equal" aria-label="等号">=</button>
      </div>
    </section>
  </main>
